name: Auto Merge COMBINADA into main

on:
  schedule:
    - cron: '0 9 * * *' # Todos los días a las 3:00 AM UTC
  workflow_dispatch: # Permite ejecución manual también

jobs:
  auto-merge:
    name: Merge COMBINADA -> main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # Necesario para poder hacer merge

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch COMBINADA branch
        run: git fetch origin COMBINADA:COMBINADA

      - name: Merge COMBINADA into main
        id: merge
        run: |
          git checkout main
          if git merge --no-ff origin/COMBINADA -m "Auto-merge COMBINADA into main"; then
            echo "MERGE_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "MERGE_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: Push changes
        if: env.MERGE_SUCCESS == 'true'
        run: git push origin main

      - name: Cancel on merge conflict
        if: env.MERGE_SUCCESS == 'false'
        run: |
          echo "::error ::Merge conflict detected. Manual resolution required."
          exit 1