<script src="/static/js/api.js"></script>
<script>
requiereAuth();

const usuario    = getUsuario();
let comandoActualId = null;

document.getElementById('navNickname').textContent = usuario.nickname;
document.getElementById('navRol').textContent      = usuario.rol;

// Mostrar botón enviar solo si tiene permiso
if (usuario.permisos.includes('enviar_comandos')) {
    document.getElementById('btnEnviar').style.display = 'inline-block';
}

// Ocultar guardar si es visualizador
if (!usuario.permisos.includes('escribir_comandos')) {
    document.getElementById('btnGuardar').style.display = 'none';
    document.getElementById('codigoEditor').readOnly    = true;
    document.getElementById('codigoEditor').placeholder = '👁 Solo lectura — no tienes permiso para escribir comandos';
}

// ── NÚMEROS DE LÍNEA ──────────────────────────────────────
const editor = document.getElementById('codigoEditor');
const lineNums = document.getElementById('lineNumbers');

function actualizarLineas() {
    const lineas = editor.value.split('\n').length;
    lineNums.innerHTML = Array.from({length: lineas}, (_, i) => i + 1).join('<br>');
    lineNums.scrollTop = editor.scrollTop;
}

editor.addEventListener('input',  actualizarLineas);
editor.addEventListener('scroll', () => lineNums.scrollTop = editor.scrollTop);
editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
        e.preventDefault();
        const s = editor.selectionStart;
        editor.value = editor.value.substring(0, s) + '    ' + editor.value.substring(s);
        editor.selectionStart = editor.selectionEnd = s + 4;
        actualizarLineas();
    }
});

// ── CONSOLA ───────────────────────────────────────────────
function log(msg, tipo = 'info') {
    const consola = document.getElementById('consola');
    const hora    = new Date().toLocaleTimeString('es-GT');
    const div     = document.createElement('div');
    div.className = `consola-line ${tipo}`;
    div.textContent = `[${hora}] ${msg}`;
    consola.appendChild(div);
    consola.scrollTop = consola.scrollHeight;
}

// ── NUEVO ARCHIVO ─────────────────────────────────────────
function nuevoArchivo() {
    if (editor.value && !confirm('¿Descartar cambios?')) return;
    editor.value = '';
    document.getElementById('nombreComando').value = '';
    comandoActualId = null;
    actualizarLineas();
    log('Nuevo archivo creado', 'info');
}

// ── PLANTILLA ─────────────────────────────────────────────
function insertarPlantilla() {
    editor.value = `PROGRAM MiPrograma\nBEGIN\n    avanzar_mts(2);\n    girar(1) + avanzar_vlts(3);\n    rotar(1);\nEND.`;
    actualizarLineas();
    log('Plantilla cargada', 'info');
}

// ── INSERTAR COMANDO ──────────────────────────────────────
function insertarComando(cmd) {
    const pos = editor.selectionStart;
    const txt = `    ${cmd}(1);\n`;
    editor.value = editor.value.substring(0, pos) + txt + editor.value.substring(pos);
    actualizarLineas();
    editor.focus();
}

// ── COMPILAR ──────────────────────────────────────────────
function compilar() {
    const codigo = editor.value.trim();
    log('Iniciando compilación...', 'info');

    if (!codigo) {
        log('ERROR: El editor está vacío', 'error');
        return false;
    }

    // Verificar estructura
    if (!codigo.includes('PROGRAM')) {
        log('ERROR: Falta la declaración PROGRAM <nombre>', 'error');
        return false;
    }
    if (!codigo.includes('BEGIN')) {
        log('ERROR: Falta BEGIN', 'error');
        return false;
    }
    if (!codigo.includes('END')) {
        log('ERROR: Falta END.', 'error');
        return false;
    }

    // Verificar instrucciones válidas
    const instrucciones = ['avanzar_vlts','avanzar_ctms','avanzar_mts',
                           'girar','circulo','cuadrado','rotar','caminar','moonwalk'];
    const lineas = codigo.split('\n');
    let errores  = 0;

    lineas.forEach((linea, i) => {
        const l = linea.trim();
        if (!l || l.startsWith('PROGRAM') || l === 'BEGIN' || l.startsWith('END')) return;

        // Verificar que termina en ;
        const partes = l.split('+').map(p => p.trim());
        partes.forEach(parte => {
            const p = parte.replace(';','').trim();
            if (!p) return;
            const esValida = instrucciones.some(ins => p.startsWith(ins));
            if (!esValida) {
                log(`ERROR línea ${i+1}: Instrucción desconocida → "${p}"`, 'error');
                errores++;
            }
        });
    });

    if (errores > 0) {
        log(`Compilación fallida — ${errores} error(es) encontrado(s)`, 'error');
        return false;
    }

    log('✅ Compilación exitosa — Sin errores', 'exito');
    return true;
}

// ── SIMULAR ───────────────────────────────────────────────
function compilarYSimular() {
    if (!compilar()) return;

    document.getElementById('modalSim').style.display = 'flex';
    const canvas = document.getElementById('canvasSim');
    const ctx    = canvas.getContext('2d');
    const estado = document.getElementById('simEstado');

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dibujar grid
    ctx.strokeStyle = 'rgba(0,212,255,0.1)';
    for (let i = 0; i < canvas.width; i += 20) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for (let i = 0; i < canvas.height; i += 20) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    // Posición inicial del Rover
    let x = canvas.width / 2;
    let y = canvas.height / 2;
    let angulo = -90; // apunta arriba
    const escala = 20;
    const trayectoria = [{x, y}];

    // Parsear instrucciones
    const lineas = editor.value.split('\n');
    lineas.forEach(linea => {
        const l = linea.trim().replace(';','');
        if (!l || l.startsWith('PROGRAM') || l === 'BEGIN' || l.startsWith('END')) return;

        const partes = l.split('+').map(p => p.trim());
        partes.forEach(parte => {
            const match = parte.match(/(\w+)\((-?\d+)\)/);
            if (!match) return;
            const [, cmd, nStr] = match;
            const n = parseInt(nStr);

            if (cmd === 'avanzar_mts' || cmd === 'avanzar_vlts' || cmd === 'avanzar_ctms') {
                const dist = cmd === 'avanzar_mts' ? n * escala * 2 :
                             cmd === 'avanzar_ctms' ? n * escala * 0.5 : n * escala;
                x += Math.cos(angulo * Math.PI/180) * dist;
                y += Math.sin(angulo * Math.PI/180) * dist;
                trayectoria.push({x, y});
            } else if (cmd === 'girar') {
                angulo += n === 1 ? 90 : n === -1 ? -90 : 0;
            } else if (cmd === 'rotar') {
                angulo += n * 360;
            } else if (cmd === 'circulo') {
                for (let a = 0; a <= 360; a += 10) {
                    trayectoria.push({
                        x: x + Math.cos(a * Math.PI/180) * n * 0.5,
                        y: y + Math.sin(a * Math.PI/180) * n * 0.5
                    });
                }
            }
        });
    });

    // Dibujar trayectoria animada
    let paso = 0;
    function animar() {
        if (paso >= trayectoria.length - 1) {
            estado.textContent = '✅ Simulación completada';
            return;
        }
        ctx.beginPath();
        ctx.moveTo(trayectoria[paso].x, trayectoria[paso].y);
        ctx.lineTo(trayectoria[paso+1].x, trayectoria[paso+1].y);
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth   = 2;
        ctx.stroke();

        // Dibujar Rover
        ctx.fillStyle = '#7b2ff7';
        ctx.beginPath();
        ctx.arc(trayectoria[paso+1].x, trayectoria[paso+1].y, 5, 0, Math.PI*2);
        ctx.fill();

        estado.textContent = `Paso ${paso+1} de ${trayectoria.length-1}`;
        paso++;
        setTimeout(animar, 80);
    }

    // Punto inicial
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.arc(trayectoria[0].x, trayectoria[0].y, 6, 0, Math.PI*2);
    ctx.fill();

    animar();
    log('🎮 Iniciando simulación...', 'info');
}

function cerrarSim() {
    document.getElementById('modalSim').style.display = 'none';
}

// ── GUARDAR COMANDO ───────────────────────────────────────
async function guardarComando() {
    if (!compilar()) return;

    const nombre = document.getElementById('nombreComando').value.trim();
    const codigo = editor.value.trim();

    if (!nombre) {
        log('ERROR: Escribe un nombre para el programa', 'error');
        return;
    }

    log('Guardando programa...', 'info');

    const res = await fetch('/api/comandos/', {
        method  : 'POST',
        headers : headersAuth(),
        body    : JSON.stringify({ nombre, codigo })
    });
    const data = await res.json();

    if (data.ok) {
        comandoActualId = data.id;
        log(`✅ Programa "${nombre}" guardado correctamente`, 'exito');
        cargarComandos();
    } else {
        log(`ERROR: ${data.error}`, 'error');
    }
}

// ── ENVIAR AL ROVER ───────────────────────────────────────
async function enviarAlRover() {
    if (!comandoActualId) {
        log('ERROR: Primero guarda el programa', 'error');
        return;
    }
    if (!compilar()) return;

    log('🚀 Enviando al Rover...', 'warning');

    const res  = await fetch(`/api/comandos/${comandoActualId}/enviar`, {
        method  : 'POST',
        headers : headersAuth()
    });
    const data = await res.json();

    if (data.ok) {
        log('✅ Comando enviado al Rover correctamente', 'exito');
        cargarComandos();
    } else {
        log(`ERROR: ${data.error}`, 'error');
    }
}

// ── CARGAR COMANDOS ───────────────────────────────────────
async function cargarComandos() {
    const res  = await fetch('/api/comandos/', { headers: headersAuth() });
    const data = await res.json();
    const lista = document.getElementById('listaComandos');

    if (!data.ok || data.comandos.length === 0) {
        lista.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:30px;font-size:13px">No hay comandos guardados</div>';
        return;
    }

    lista.innerHTML = data.comandos.map(c => `
        <div class="comando-item" onclick="cargarEnEditor(${c.id}, \`${c.codigo.replace(/`/g,"'")}\`, '${c.nombre}')">
            <h4>${c.nombre}</h4>
            <div class="meta">
                <span>${c.nickname}</span>
                <span class="estado-badge estado-${c.estado}">${c.estado}</span>
            </div>
            <div style="font-size:10px;color:#555;margin-top:4px">
                ${new Date(c.fecha_creacion).toLocaleString('es-GT')}
            </div>
        </div>
    `).join('');
}

// ── CARGAR EN EDITOR ──────────────────────────────────────
function cargarEnEditor(id, codigo, nombre) {
    editor.value = codigo;
    document.getElementById('nombreComando').value = nombre;
    comandoActualId = id;
    actualizarLineas();
    log(`📂 Programa "${nombre}" cargado`, 'info');
}

// Cargar comandos al inicio
cargarComandos();
actualizarLineas();
</script>
