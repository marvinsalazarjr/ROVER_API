<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva contraseña — UMG Basic Rover 2.0</title>
    <link rel="stylesheet" href="/static/css/estilo.css">
</head>
<body>
<div class="fondo"></div>
<div class="auth-container">
    <div class="auth-card">
        <div class="logo">
            <h1>🚀 UMG Basic Rover 2.0</h1>
            <p>Crea tu nueva contraseña</p>
        </div>

        <div id="alerta" class="alerta"></div>

        <form id="formNuevaPassword">
            <div class="form-group">
                <label>🔐 Nueva contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
            </div>
            <div class="form-group">
                <label>🔐 Confirmar contraseña</label>
                <input type="password" id="password_confirm" placeholder="Repite tu contraseña" required>
            </div>
            <button type="submit" class="btn-primary" id="btnCambiar">
                Cambiar contraseña
            </button>
        </form>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
// Obtener token de la URL
const token = window.location.pathname.split('/').pop();

document.getElementById('formNuevaPassword').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn      = document.getElementById('btnCambiar');
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('password_confirm').value;

    if (password !== confirm) {
        mostrarAlerta('alerta', '❌ Las contraseñas no coinciden', 'error');
        return;
    }
    if (password.length < 8) {
        mostrarAlerta('alerta', '❌ Mínimo 8 caracteres', 'error');
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'Actualizando...';

    try {
        const res = await fetch(`http://localhost:5000/api/auth/recuperar/${token}`, {
            method  : 'POST',
            headers : { 'Content-Type': 'application/json' },
            body    : JSON.stringify({ password, password_confirm: confirm })
        });
        const data = await res.json();

        if (data.ok) {
            mostrarAlerta('alerta', '✅ ' + data.mensaje, 'exito');
            setTimeout(() => window.location.href = '/login', 2000);
        } else {
            mostrarAlerta('alerta', '❌ ' + data.error, 'error');
        }
    } catch (err) {
        mostrarAlerta('alerta', '❌ Error de conexión', 'error');
    } finally {
        btn.disabled    = false;
        btn.textContent = 'Cambiar contraseña';
    }
});
</script>
</body>
</html>
