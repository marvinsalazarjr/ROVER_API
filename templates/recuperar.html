<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar contraseña — UMG Basic Rover 2.0</title>
    <link rel="stylesheet" href="/static/css/estilo.css">
</head>
<body>
<div class="fondo"></div>
<div class="auth-container">
    <div class="auth-card">
        <div class="logo">
            <h1>🚀 UMG Basic Rover 2.0</h1>
            <p>Recupera tu contraseña</p>
        </div>

        <div id="alerta" class="alerta"></div>

        <form id="formRecuperar">
            <div class="form-group">
                <label>📧 Correo electrónico</label>
                <input type="email" id="correo" placeholder="tu@correo.com" required>
            </div>
            <button type="submit" class="btn-primary" id="btnRecuperar">
                Enviar instrucciones
            </button>
        </form>

        <div class="auth-link">
            <a href="/login">← Volver al login</a>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
document.getElementById('formRecuperar').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn    = document.getElementById('btnRecuperar');
    const correo = document.getElementById('correo').value;

    btn.disabled    = true;
    btn.textContent = 'Enviando...';

    try {
        const res = await fetch('http://localhost:5000/api/auth/recuperar', {
            method  : 'POST',
            headers : { 'Content-Type': 'application/json' },
            body    : JSON.stringify({ correo })
        });
        const data = await res.json();
        mostrarAlerta('alerta', '✅ ' + data.mensaje, 'exito');
        document.getElementById('formRecuperar').reset();
    } catch (err) {
        mostrarAlerta('alerta', '❌ Error de conexión', 'error');
    } finally {
        btn.disabled    = false;
        btn.textContent = 'Enviar instrucciones';
    }
});
</script>
</body>
</html>
